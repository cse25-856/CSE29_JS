<!DOCTYPE html>
<html>
<head>
    <title>Factorial Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Factorial Calculator</h2>

        <input type="number" id="num" placeholder="Enter a number">

        <button onclick="findFactorial()">Calculate Factorial</button>

        <div id="result"></div>
    </div>

    <script>
        function findFactorial() {
            let n = parseInt(document.getElementById("num").value);

            if (n < 0 || isNaN(n)) {
                document.getElementById("result").innerHTML =
                    "Please enter a valid non-negative number!";
                return;
            }

            let factorial = 1;  

            for (let i = 1; i <= n; i++) {
                factorial *= i;
            }

            document.getElementById("result").innerHTML =
                "Factorial of " + n + " = " + factorial;
        }
    </script>

</body>
</html>
